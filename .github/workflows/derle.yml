name: Dostlar Birligi Ozel Derleme
on:
  workflow_dispatch:

jobs:
  android_build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Java Kur
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Flutter Kur
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Bagimliliklari Yukle
        run: flutter pub get

      - name: APK Derle
        run: flutter build apk --release

      - name: Dosyayi Disari Aktar (Yukle)
        uses: actions/upload-artifact@v4
        with:
          name: Spotube-Android-Uygulamasi
          path: build/app/outputs/flutter-apk/app-release.apk
